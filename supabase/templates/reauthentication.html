<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Sona verification code</title>
</head>
<body style="margin:0;padding:0;background:#ECECEE;font-family:'Helvetica Neue',Arial,sans-serif;color:#1D1D1F;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#ECECEE;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#FFFFFF;border:1px solid #DEDEE1;border-radius:20px;overflow:hidden;">
          <!-- Masthead -->
          <tr>
            <td style="padding:44px 40px 0;text-align:center;">
              <div style="font-family:Georgia,'Times New Roman',serif;font-size:40px;font-weight:600;color:#1D1D1F;letter-spacing:0.5px;">
                Sona<span style="color:#6E6E73;">.</span>
              </div>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:20px 40px 0;text-align:center;">
              <h1 style="margin:0 0 12px;font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:600;color:#1D1D1F;line-height:1.3;">
                Confirm it&rsquo;s you.
              </h1>
              <p style="margin:0;font-size:15px;color:#6E6E73;line-height:1.6;">
                For your security, enter this code to continue with a sensitive action on your Sona account.
              </p>
            </td>
          </tr>
          <!-- Code -->
          <tr>
            <td style="padding:28px 40px 0;text-align:center;">
              <div style="display:inline-block;background:#ECECEE;border-radius:16px;padding:16px 32px;">
                <span style="font-family:Georgia,'Times New Roman',serif;font-size:32px;font-weight:600;color:#1D1D1F;letter-spacing:0.2em;">{{ .Token }}</span>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 40px 0;text-align:center;">
              <p style="margin:0;font-size:13px;color:#6E6E73;line-height:1.6;">
                This code expires soon for your security.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:36px 40px 44px;text-align:center;">
              <div style="height:1px;background:#DEDEE1;margin:0 0 20px;"></div>
              <p style="margin:0 0 8px;font-size:13px;color:#6E6E73;line-height:1.5;">
                If you didn&rsquo;t request this, you can safely ignore this email.
              </p>
              <p style="margin:0;font-size:11px;color:#6E6E73;letter-spacing:0.04em;">
                Made with &#9829; &mdash; Sona &middot; voice logs for the ones you love
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
